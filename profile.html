<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>我的 - 网络质量指数</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  @import url('shadcn-tokens.css');

  :root {
    --accent-cyan: var(--brand);
    --accent-blue: #0EA5E9;
    --accent-green: var(--success);
    --accent-orange: var(--warning);
    --accent-red: var(--danger);
  }

  body {
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .icon-svg { display:block; }

  /* 顶部导航 */
  /* 主内容区 */
  .main-content {
    position: relative;
    z-index: 1;
    padding: calc(var(--nav-height) + var(--space-4)) var(--space-6) var(--space-6);
  }

  /* 用户卡片 */
  .user-card {
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--card-padding);
    margin-bottom: var(--card-gap);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    transition: box-shadow 0.2s ease;
  }

  .user-card:hover { box-shadow: var(--shadow-hover); }

  .user-avatar {
    width: 56px; height: 56px;
    border-radius: var(--radius);
    background: var(--brand-muted);
    border: 1px solid var(--brand-border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .user-avatar svg {
    width: 26px; height: 26px;
    color: var(--brand);
  }

  .user-info {
    flex: 1;
    min-width: 0;
  }

  .user-name {
    font-size: var(--text-lg);
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 3px;
  }

  .user-id {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
  }

  .user-arrow {
    width: 18px; height: 18px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }

  /* 网络统计 */
  .stats-row {
    display: flex;
    gap: var(--space-2);
    margin-bottom: var(--card-gap);
  }

  .stat-card {
    flex: 1;
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--card-padding) var(--space-3);
    text-align: center;
  }

  .stat-card .stat-number {
    font-size: 22px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    margin-bottom: var(--space-1);
  }

  .stat-card .stat-label {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
  }

  /* 列表分组 */
  .menu-section {
    margin-bottom: var(--card-gap);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-3);
    padding: 0 2px;
  }

  .section-title {
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .menu-list {
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--card-padding) var(--card-padding);
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
  }

  .menu-item:active {
    background: var(--bg-subtle);
  }

  .menu-item + .menu-item {
    border-top: var(--border);
  }

  .menu-item .item-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .menu-item .item-icon svg {
    width: var(--icon-sm); height: var(--icon-sm);
  }

  .menu-item .item-content {
    flex: 1;
    min-width: 0;
  }

  .menu-item .item-title {
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--text-primary);
  }

  .menu-item .item-subtitle {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    margin-top: 1px;
  }

  .menu-item .item-right {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    flex-shrink: 0;
  }

  .menu-item .item-value {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
  }

  .menu-item .item-arrow {
    width: 14px; height: 14px;
    color: var(--text-tertiary);
    opacity: 0.5;
  }

  .menu-item .item-badge {
    font-size: var(--text-xs);
    font-weight: 500;
    padding: 2px 7px;
    border-radius: var(--radius-sm);
    background: var(--brand-muted);
    color: var(--brand);
  }

  /* 开关 */
  .toggle-switch {
    width: 44px; height: 26px;
    border-radius: var(--radius-full);
    background: var(--bg-muted);
    position: relative;
    cursor: pointer;
    transition: background 0.2s ease;
    flex-shrink: 0;
  }

  .toggle-switch.on {
    background: var(--brand);
  }

  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: var(--radius-full);
    background: white;
    box-shadow: var(--shadow);
    transition: transform 0.2s ease;
  }

  .toggle-switch.on::after {
    transform: translateX(18px);
  }

  /* 图标背景色 */
  .icon-bg-cyan { background: var(--brand-muted); }
  .icon-bg-cyan svg { color: var(--brand); }

  .icon-bg-blue { background: rgba(126,184,216,0.08); }
  .icon-bg-blue svg { color: var(--accent-blue); }

  .icon-bg-green { background: rgba(140,197,160,0.08); }
  .icon-bg-green svg { color: var(--accent-green); }

  .icon-bg-orange { background: rgba(212,165,116,0.08); }
  .icon-bg-orange svg { color: var(--accent-orange); }

  .icon-bg-red { background: rgba(212,136,122,0.08); }
  .icon-bg-red svg { color: var(--accent-red); }

  /* 版本信息 */
  .version-info {
    text-align: center;
    padding: var(--space-6) 0 var(--space-2);
  }

  .version-text {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
  }

  /* 底部导航栏 */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: var(--tab-height);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: var(--overlay);
    backdrop-filter: blur(var(--overlay-blur));
    -webkit-backdrop-filter: blur(var(--overlay-blur));
    border-top: var(--border);
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: var(--space-1) var(--space-6);
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-item:active { transform: scale(0.9); }

  .tab-item .tab-icon {
    width: var(--icon-md); height: var(--icon-md);
    color: var(--text-tertiary);
    transition: color 0.2s ease;
  }

  .tab-item .tab-label {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
    transition: color 0.2s ease;
  }

  .tab-item.active .tab-icon { color: var(--brand); }
  .tab-item.active .tab-label { color: var(--brand); font-weight: 500; }
</style>
</head>
