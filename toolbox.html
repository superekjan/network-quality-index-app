<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>工具箱 - 网络质量指数</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  @import url('shadcn-tokens.css');

  :root {
    --accent-cyan: var(--brand);
    --accent-blue: #0EA5E9;
    --accent-green: var(--success);
    --accent-orange: var(--warning);
    --accent-red: var(--danger);
  }

  body {
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .icon-svg { display:block; }

  /* 顶部导航 */
  /* 主内容区 */
  .main-content {
    position: relative;
    z-index: 1;
    padding: calc(var(--nav-height) + var(--space-4)) var(--space-6) var(--space-6);
  }

  /* 分类标题 */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-3);
    padding: 0 2px;
  }

  .section-title {
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .section-desc {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
  }

  /* 工具网格 */
  .tools-section {
    margin-bottom: var(--space-6);
  }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-3);
  }

  .tool-card {
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--card-padding) var(--space-4);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .tool-card:hover { box-shadow: var(--shadow-hover); }
  .tool-card:active { transform: scale(0.97); }

  .tool-card .tool-icon-wrap {
    width: 44px; height: 44px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: var(--space-3);
    position: relative;
  }

  .tool-card .tool-icon {
    width: var(--icon-md); height: var(--icon-md);
    position: relative;
    z-index: 1;
  }

  .tool-card .tool-name {
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: var(--space-1);
  }

  .tool-card .tool-desc {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  .tool-card .tool-badge {
    position: absolute;
    top: var(--space-3); right: var(--space-3);
    font-size: var(--text-xs);
    font-weight: 500;
    padding: 2px var(--space-2);
    border-radius: var(--radius-sm);
    letter-spacing: 0.3px;
  }

  .badge-new {
    background: var(--brand-muted);
    color: var(--brand);
  }

  .badge-hot {
    background: rgba(212,165,116,0.12);
    color: var(--accent-orange);
  }

  /* 图标背景色 */
  .icon-bg-cyan { background: var(--brand-muted); }
  .icon-bg-cyan .tool-icon { color: var(--brand); }

  .icon-bg-blue { background: rgba(126,184,216,0.08); }
  .icon-bg-blue .tool-icon { color: var(--accent-blue); }

  .icon-bg-green { background: rgba(140,197,160,0.08); }
  .icon-bg-green .tool-icon { color: var(--accent-green); }

  .icon-bg-orange { background: rgba(212,165,116,0.08); }
  .icon-bg-orange .tool-icon { color: var(--accent-orange); }

  /* 快捷操作卡片 */
  .quick-actions {
    margin-bottom: var(--space-6);
  }

  .action-row {
    display: flex;
    gap: var(--space-3);
  }

  .action-card {
    flex: 1;
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--card-padding);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .action-card:hover { box-shadow: var(--shadow-hover); }
  .action-card:active { transform: scale(0.97); }

  .action-card .action-top {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-bottom: var(--space-2);
  }

  .action-card .action-icon {
    width: var(--icon-md); height: var(--icon-md);
    color: var(--brand);
  }

  .action-card .action-title {
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-primary);
  }

  .action-card .action-value {
    font-size: 24px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    margin-bottom: 2px;
  }

  .action-card .action-unit {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
  }

  /* 历史记录 */
  .history-section {
    margin-bottom: var(--space-6);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--space-3) var(--card-padding);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .history-item:hover { box-shadow: var(--shadow-hover); }
  .history-item:active { transform: scale(0.98); }

  .history-item .hist-icon {
    width: var(--btn-height); height: var(--btn-height);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .history-item .hist-icon svg {
    width: var(--icon-sm); height: var(--icon-sm);
  }

  .history-item .hist-info {
    flex: 1;
    min-width: 0;
  }

  .history-item .hist-title {
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .history-item .hist-meta {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
  }

  .history-item .hist-result {
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--brand);
    flex-shrink: 0;
  }

  /* 底部导航栏 */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: var(--tab-height);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: var(--overlay);
    backdrop-filter: blur(var(--overlay-blur));
    -webkit-backdrop-filter: blur(var(--overlay-blur));
    border-top: var(--border);
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: var(--space-1) var(--space-6);
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-item:active { transform: scale(0.9); }

  .tab-item .tab-icon {
    width: var(--icon-md); height: var(--icon-md);
    color: var(--text-tertiary);
    transition: color 0.2s ease;
  }

  .tab-item .tab-label {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
    transition: color 0.2s ease;
  }

  .tab-item.active .tab-icon { color: var(--brand); }
  .tab-item.active .tab-label { color: var(--brand); font-weight: 500; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
  <div class="brand-bar"></div>
  <span class="brand-name">工具箱</span>
</div>

<!-- 主内容 -->
<div class="main-content">

  <!-- 快捷操作 -->
  <div class="quick-actions">
    <div class="section-header">
      <span class="section-title">快捷诊断</span>
    </div>
    <div class="action-row">
      <div class="action-card" onclick="runSpeedTest()">
        <div class="action-top">
          <svg class="action-icon icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
          </svg>
          <span class="action-title">一键测速</span>
        </div>
        <div class="action-value" id="speedValue">--</div>
        <div class="action-unit">Mbps</div>
      </div>
      <div class="action-card" onclick="runPingTest()">
        <div class="action-top">
          <svg class="action-icon icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span class="action-title">延迟测试</span>
        </div>
        <div class="action-value" id="pingValue">--</div>
        <div class="action-unit">ms</div>
      </div>
    </div>
  </div>

</div>

<!-- 底部导航栏 -->
<div class="tab-bar">
  <a class="tab-item" href="index.html">
    <svg class="tab-icon icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span class="tab-label">首页</span>
  </a>
  <a class="tab-item active" href="toolbox.html">
    <svg class="tab-icon icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
    </svg>
    <span class="tab-label">工具箱</span>
  </a>
  <a class="tab-item" href="profile.html">
    <svg class="tab-icon icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span class="tab-label">我的</span>
  </a>
</div>

<script>
// 模拟测速动画
function runSpeedTest() {
  const el = document.getElementById('speedValue');
  el.textContent = '...';
  let progress = 0;
  const target = 867;
  const interval = setInterval(() => {
    progress += Math.random() * 150;
    if (progress >= target) {
      progress = target;
      clearInterval(interval);
    }
    el.textContent = Math.round(progress);
  }, 80);
}

function runPingTest() {
  const el = document.getElementById('pingValue');
  el.textContent = '...';
  let progress = 0;
  const target = 3;
  const interval = setInterval(() => {
    progress += Math.random() * 1.2;
    if (progress >= target) {
      progress = target;
      clearInterval(interval);
    }
    el.textContent = Math.round(progress);
  }, 120);
}
</script>
</body>
</html>
