<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>网络质量指数</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  @import url('shadcn-tokens.css');

  /* Page-specific overrides */
  :root {
    --accent-blue: #0EA5E9;
    --accent-cyan: var(--brand);
    --accent-green: var(--success);
    --accent-orange: var(--warning);
    --accent-red: var(--danger);
    --glow-blue: rgba(14,165,233,0.25);
    --glow-cyan: rgba(22,119,255,0.2);
  }

  body {
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    position: relative;
  }

  .icon-svg { display:block; }

  /* 顶部导航 */
  /* 主滚动容器 */
  .main-scroll {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: var(--tab-height);
    scroll-behavior: smooth;
  }

  .main-scroll::-webkit-scrollbar { display:none; }

  /* 户型图区域 - 固定在背景 */
  .floorplan-section {
    position: fixed;
    top: calc(var(--nav-height) + var(--space-4));
    left: 0;
    right: 0;
    height: 50vh;
    background: transparent;
    overflow: hidden;
    z-index: 3;
    pointer-events: none;
    transition: opacity 0.1s ease-out;
  }

  .floorplan-canvas {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .floorplan-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* 信号热力图图例 - 左下角 */
  .signal-legend {
    position: absolute;
    bottom: var(--space-3);
    left: var(--space-3);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 10px;
    color: var(--text-tertiary);
  }

  .legend-bar {
    width: 48px;
    height: 4px;
    border-radius: var(--radius-full);
    background: linear-gradient(90deg, var(--heatmap-weak), var(--heatmap-medium), var(--heatmap-strong));
  }

  .legend-label {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .wall-line {
    stroke: var(--floorplan-line);
    stroke-width: 1.5;
    fill: none;
    filter: url(#wallGlow);
  }

  .wall-outer {
    stroke: rgba(160,158,154,0.35);
    stroke-width: 2;
    fill: none;
    filter: url(#wallGlow);
  }

  .door-arc {
    stroke: rgba(160,158,154,0.2);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 3 3;
  }

  .window-line {
    stroke: rgba(22,119,255,0.2);
    stroke-width: 2;
    fill: none;
    stroke-dasharray: 6 4;
  }

  .room-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 400;
    fill: rgba(142,142,147,0.4);
    text-anchor: middle;
    letter-spacing: 1px;
  }

  /* 设备节点 */
  .device-node {
    position: absolute;
    z-index: 10;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .device-node:active { transform: scale(0.92); }

  .device-node .node-core {
    width: var(--btn-height); height: var(--btn-height);
    border-radius: var(--radius);
    background: var(--card);
    border: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: var(--shadow);
    transition: all 0.2s ease;
  }

  .device-node:hover .node-core,
  .device-node.active .node-core {
    border-color: var(--brand-border);
    box-shadow: var(--shadow-hover), 0 0 12px var(--glow-cyan);
  }

  .device-node .node-icon {
    width: var(--icon-sm); height: var(--icon-sm);
    opacity: 0.7;
  }

  .device-node .node-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid transparent;
    transition: border-color 0.3s;
  }

  .device-node.active .node-ring {
    border-color: rgba(22,119,255,0.3);
    animation: ring-expand 2s ease-out infinite;
  }

  @keyframes ring-expand {
    0% { inset:-4px; opacity:1; }
    100% { inset:-16px; opacity:0; }
  }

  .device-node .node-label {
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 400;
    color: var(--text-tertiary);
    white-space: nowrap;
    letter-spacing: 0.3px;
    pointer-events: none;
  }

  .signal-indicator {
    position: absolute;
    top: -2px; right: -2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--bg);
  }

  .signal-good { background: var(--success); box-shadow: 0 0 4px var(--success-muted); }
  .signal-medium { background: var(--warning); box-shadow: 0 0 4px var(--warning-muted); }
  .signal-weak { background: var(--danger); box-shadow: 0 0 4px var(--danger-muted); }

  .traveling-dot {
    fill: var(--accent-cyan);
    filter: url(#dotGlow);
  }

  /* 查看网络状态入口 - 独立固定定位 */
  .view-status-entry {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: var(--space-1);
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
  }

  .view-status-entry:hover { background: rgba(255,255,255,0.7); }
  .view-status-entry:active { transform: translateX(-50%) scale(0.97); }

  .view-status-entry .entry-icon {
    width: 12px; height: 12px;
    color: var(--accent-cyan);
  }

  .view-status-entry .entry-text {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent-cyan);
    letter-spacing: 0.3px;
  }

  .view-status-entry .entry-arrow {
    width: 10px; height: 10px;
    color: var(--accent-cyan);
    opacity: 0.6;
  }

  /* 下方内容区 - 覆盖在户型图上方 */
  .content-section {
    position: relative;
    z-index: 2;
    padding: 0 var(--space-4);
    margin-top: calc(50vh + var(--nav-height) + var(--space-4));
    background: var(--bg);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding-top: var(--space-4);
  }

  /* 网络总览卡片 */
  .overview-card {
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--card-padding);
    margin-bottom: var(--card-gap);
  }

  .overview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-4);
  }

  .overview-header .label {
    font-size: var(--text-xs);
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .overview-score {
    display: flex;
    align-items: baseline;
    gap: var(--space-1);
    margin-bottom: var(--space-6);
  }

  .overview-score .number {
    font-size: 42px;
    font-weight: 300;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -1px;
  }

  .overview-score .unit {
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--text-tertiary);
  }

  .overview-metrics {
    display: flex;
  }

  .metric-item {
    flex: 1;
    text-align: center;
    position: relative;
  }

  .metric-item + .metric-item::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 1px;
    background: rgba(22,119,255,0.08);
  }

  .metric-value {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .metric-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
  }

  /* 设备列表 */
  .devices-section {
    margin-bottom: var(--space-6);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-3);
    padding: 0 var(--space-1);
  }

  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .section-action {
    font-size: 11px;
    font-weight: 400;
    color: var(--accent-cyan);
    cursor: pointer;
  }

  .device-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  .device-card {
    flex: 1;
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius);
    padding: var(--space-4);
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .device-card:hover { box-shadow: var(--shadow-hover); }
  .device-card:active { transform: scale(0.97); }

  .device-card .card-icon {
    width: 36px; height: 36px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .device-card .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .device-card .card-status {
    font-size: 12px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-status .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
  }

  .status-online { color: var(--success); }
  .status-online .status-dot { background: var(--success); box-shadow: 0 0 4px rgba(34,197,94,0.5); }
  .status-warning { color: var(--warning); }
  .status-warning .status-dot { background: var(--warning); box-shadow: 0 0 4px rgba(245,158,11,0.5); }

  /* 快捷控制轮盘 */
  .control-wheel-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--overlay);
    backdrop-filter: blur(var(--overlay-blur));
    -webkit-backdrop-filter: blur(var(--overlay-blur));
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .control-wheel-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .control-wheel {
    position: relative;
    width: 200px; height: 200px;
    transform: scale(0.7);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .control-wheel-overlay.visible .control-wheel {
    transform: scale(1);
    opacity: 1;
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 64px; height: 64px;
    border-radius: var(--radius-full);
    background: var(--card);
    border: var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .wheel-center .center-icon {
    width: 24px; height: 24px;
    opacity: 0.7;
  }

  .wheel-item {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: var(--radius-full);
    background: var(--card);
    border: var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 1;
  }

  .wheel-item:active { transform: scale(0.9); }

  .wheel-item .wheel-icon {
    width: 18px; height: 18px;
    opacity: 0.6;
  }

  .wheel-item:nth-child(2) { top:0; left:50%; transform:translateX(-50%); }
  .wheel-item:nth-child(3) { top:25%; right:0; }
  .wheel-item:nth-child(4) { bottom:25%; right:0; }
  .wheel-item:nth-child(5) { bottom:0; left:50%; transform:translateX(-50%); }
  .wheel-item:nth-child(6) { bottom:25%; left:0; }
  .wheel-item:nth-child(7) { top:25%; left:0; }

  /* 设备详情卡片 */
  .detail-card-overlay {
    position: fixed;
    inset: 0;
    z-index: 150;
    background: var(--overlay);
    backdrop-filter: blur(var(--overlay-blur));
    -webkit-backdrop-filter: blur(var(--overlay-blur));
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .detail-card-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .detail-card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: var(--border);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    box-shadow: var(--shadow-hover);
    padding: var(--card-padding) var(--card-padding) calc(env(safe-area-inset-bottom, 20px) + var(--card-padding));
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  .detail-card-overlay.visible .detail-card {
    transform: translateY(0);
  }

  .detail-card .detail-handle {
    width: 36px; height: 4px;
    background: var(--text-muted);
    border-radius: var(--radius-full);
    margin: 0 auto var(--space-4);
  }

  .detail-header {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-6);
  }

  .detail-icon-wrap {
    width: 48px; height: 48px;
    border-radius: var(--radius);
    background: var(--brand-muted);
    border: 1px solid var(--brand-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-icon-wrap .detail-icon {
    width: 22px; height: 22px;
    opacity: 0.7;
  }

  .detail-info .detail-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .detail-info .detail-location {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-tertiary);
  }

  .detail-stats {
    display: flex;
    margin-bottom: var(--space-6);
  }

  .detail-stat {
    flex: 1;
    text-align: center;
    padding: var(--space-3) 0;
    background: var(--bg-subtle);
    border-radius: var(--radius-sm);
  }

  .detail-stat + .detail-stat { margin-left: var(--space-2); }

  .detail-stat .stat-value {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .detail-stat .stat-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
  }

  .detail-signal-bar {
    height: 4px;
    background: var(--bg-muted);
    border-radius: var(--radius-full);
    overflow: hidden;
    margin-bottom: var(--space-6);
  }

  .detail-signal-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }

  .detail-actions {
    display: flex;
    gap: var(--space-4);
  }

  .detail-btn {
    flex: 1;
    padding: var(--space-4);
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .detail-btn:active { transform:scale(0.96); }

  .detail-btn.primary {
    background: var(--brand-muted);
    color: var(--brand);
    border: 1px solid var(--brand-border);
  }

  .detail-btn.secondary {
    background: var(--bg-subtle);
    color: var(--text-secondary);
    border: var(--border);
  }

  /* 底部导航栏 */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: var(--tab-height);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: var(--overlay);
    backdrop-filter: blur(var(--overlay-blur));
    -webkit-backdrop-filter: blur(var(--overlay-blur));
    border-top: var(--border);
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: var(--space-1) var(--space-6);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-item:active { transform: scale(0.9); }

  .tab-item .tab-icon {
    width: 22px; height: 22px;
    color: var(--text-tertiary);
    transition: color 0.3s;
  }

  .tab-item .tab-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
    transition: color 0.3s;
  }

  .tab-item.active .tab-icon { color: var(--brand); }
  .tab-item.active .tab-label { color: var(--brand); font-weight: 500; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
  <div class="brand-bar"></div>
  <span class="brand-name">网络质量指数</span>
</div>

<!-- 户型图区域 - 固定背景 -->
<div class="floorplan-section" id="floorplanSection">
  <div class="floorplan-canvas" id="floorplanCanvas">
    <svg class="floorplan-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="wallGlow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="routerShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.15)"/>
        </filter>
        <radialGradient id="routerHeat1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(22,119,255,0.18)"/>
          <stop offset="70%" stop-color="rgba(22,119,255,0.06)"/>
          <stop offset="100%" stop-color="rgba(22,119,255,0)"/>
        </radialGradient>
        <radialGradient id="routerHeat2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(126,184,216,0.16)"/>
          <stop offset="70%" stop-color="rgba(126,184,216,0.05)"/>
          <stop offset="100%" stop-color="rgba(126,184,216,0)"/>
        </radialGradient>
        <radialGradient id="routerHeat3" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(140,197,160,0.16)"/>
          <stop offset="70%" stop-color="rgba(140,197,160,0.05)"/>
          <stop offset="100%" stop-color="rgba(140,197,160,0)"/>
        </radialGradient>
      </defs>

      <!-- 热力图层（裁剪到房间范围内） -->
      <g id="heatmapLayer" clip-path="url(#roomsClip)"></g>

      <!-- 户型图内容（房间层） -->
      <g id="floorplanContent"></g>

      <!-- 路由器层 -->
      <g id="routerLayer"></g>
    </svg>

    <!-- 信号热力图图例 -->
    <div class="signal-legend">
      <span class="legend-label">弱</span>
      <div class="legend-bar"></div>
      <span class="legend-label">强</span>
    </div>
  </div>

  <!-- 查看网络状态入口 - 独立固定层 -->
  <a class="view-status-entry" href="network-status.html">
    <svg class="entry-icon icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <span class="entry-text">查看网络状态</span>
    <svg class="entry-arrow icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </a>
</div>

<!-- 主滚动容器 -->
<div class="main-scroll" id="mainScroll">

  <!-- 下方内容区 -->
  <div class="content-section">

    <!-- 网络总览 -->
    <div class="overview-card">
      <div class="overview-header">
        <span class="label">网络质量指数</span>
        <span class="label" style="color:var(--accent-cyan)">实时</span>
      </div>
      <div class="overview-score">
        <span class="number">92</span>
        <span class="unit">分</span>
      </div>
      <div class="overview-metrics">
        <div class="metric-item">
          <div class="metric-value">867</div>
          <div class="metric-label">Mbps ↓</div>
        </div>
        <div class="metric-item">
          <div class="metric-value">432</div>
          <div class="metric-label">Mbps ↑</div>
        </div>
        <div class="metric-item">
          <div class="metric-value">3</div>
          <div class="metric-label">ms 延迟</div>
        </div>
        <div class="metric-item">
          <div class="metric-value">3</div>
          <div class="metric-label">设备在线</div>

<script src="floorplan-config.js"></script>
<script>
// ============ 生成白色3D路由器SVG ============
function createRouterSvg(index) {
  const device = ROUTER_DEVICES[index];
  const isOnline = device.status === 'online';
  const opacity = isOnline ? 1 : 0.5;
  const s = 1.5;

  return `
    <circle cx="0" cy="0" r="${18*s}" fill="${device.color}" opacity="${opacity}"/>
    <circle cx="0" cy="0" r="${12*s}" fill="${device.color}" opacity="${opacity * 0.5}"/>
    <g filter="url(#routerShadow)" opacity="${opacity}" transform="scale(${s})">
      <ellipse cx="0" cy="4" rx="9" ry="3" fill="rgba(0,0,0,0.08)"/>
      <path d="M-8,-2 L-8,2 Q-8,5 0,5 Q8,5 8,2 L8,-2 Q8,1 0,1 Q-8,1 -8,-2Z" fill="#d1d1d6"/>
      <path d="M-8,-6 Q-8,-2 0,-2 Q8,-2 8,-6 L8,-2 Q8,1 0,1 Q-8,1 -8,-2Z" fill="#f2f2f7"/>
      <path d="M-8,-6 Q-8,-9 0,-9 Q8,-9 8,-6 Q8,-2 0,-2 Q-8,-2 -8,-6Z" fill="white"/>
      <line x1="-3" y1="-9" x2="-4" y2="-15" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="-4" cy="-15.5" r="1" fill="#c7c7cc"/>
      <line x1="3" y1="-9" x2="4" y2="-15" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="4" cy="-15.5" r="1" fill="#c7c7cc"/>
      <circle cx="-3" cy="-5" r="0.8" fill="${isOnline ? '#1677FF' : '#aeaeb2'}"/>
      <circle cx="0" cy="-5" r="0.8" fill="${isOnline ? '#1677FF' : '#aeaeb2'}"/>
      <circle cx="3" cy="-5" r="0.8" fill="${isOnline ? '#8cc5a0' : '#aeaeb2'}"/>
    </g>
  `;
}

// 渲染户型图
function renderHomeFloorplan() {
  const layout = getFloorplanLayout();
  const content = document.getElementById('floorplanContent');
  content.innerHTML = generateRouterSvg(layout);

  // 渲染信号强度热力图（绿→红渐变）
  const heatmapLayer = document.getElementById('heatmapLayer');
  heatmapLayer.innerHTML = generateSignalHeatmapSvg(layout);

  // 渲染路由器图标（仅在线路由器）
  const routerLayer = document.getElementById('routerLayer');
  const routerPositions = getRouterPositions();
  let routerSvg = '';
  routerPositions.forEach((rp, i) => {
    const device = ROUTER_DEVICES[i];
    if (!device || device.status !== 'online') return;
    routerSvg += `<g transform="translate(${rp.x}, ${rp.y})">${createRouterSvg(i)}</g>`;
  });
  routerLayer.innerHTML = routerSvg;
}
renderHomeFloorplan();

// 滚动时户型图渐变透明，按钮随滚动隐藏到内容下方
const floorplanSection = document.getElementById('floorplanSection');
const mainScroll = document.getElementById('mainScroll');
const viewStatusEntry = document.querySelector('.view-status-entry');
const fadeDistance = 200;

mainScroll.addEventListener('scroll', () => {
  const scrollTop = mainScroll.scrollTop;
  const opacity = Math.max(0, 1 - scrollTop / fadeDistance);
  floorplanSection.style.opacity = opacity;
  if (scrollTop > 20) {
    floorplanSection.style.zIndex = '0';
    mainScroll.style.zIndex = '1';
    if (viewStatusEntry) {
      viewStatusEntry.style.zIndex = '0';
      viewStatusEntry.style.pointerEvents = 'none';
    }
  } else {
    floorplanSection.style.zIndex = '3';
    mainScroll.style.zIndex = '0';
    if (viewStatusEntry) {
      viewStatusEntry.style.zIndex = '4';
      viewStatusEntry.style.pointerEvents = 'auto';
    }
  }
}, { passive: true });

const devices = {
  router1: { name:'主路由',   location:'客厅 · 在线',     down:867, up:432, ping:3,  signal:92 },
  router2: { name:'子路由A',  location:'主卧 · 在线',     down:540, up:260, ping:5,  signal:78 },
  router3: { name:'子路由B',  location:'次卧 · 在线',     down:480, up:220, ping:6,  signal:72 }
};

// 设备详情
function showDetail(id) {
  const d = devices[id];
  if (!d) return;
  document.getElementById('detailName').textContent = d.name;
  document.getElementById('detailLocation').textContent = d.location;
  document.getElementById('detailDown').textContent = d.down;
  document.getElementById('detailUp').textContent = d.up;
  document.getElementById('detailPing').textContent = d.ping;
  document.getElementById('detailSignalFill').style.width = d.signal + '%';
  const fill = document.getElementById('detailSignalFill');
  if (d.signal >= 70) fill.style.background = 'linear-gradient(90deg, #1677FF, #0EA5E9)';
  else if (d.signal >= 40) fill.style.background = 'linear-gradient(90deg, #f59e0b, #e8c078)';
  else fill.style.background = 'linear-gradient(90deg, #ef4444, #e89888)';
  document.getElementById('detailOverlay').classList.add('visible');
}

function hideDetail() {
  document.getElementById('detailOverlay').classList.remove('visible');
}

// 快捷控制轮盘
let longPressTimer = null;
document.querySelectorAll('.device-node').forEach(node => {
  node.addEventListener('pointerdown', e => {
    longPressTimer = setTimeout(() => {
      e.preventDefault();
      showWheel(e, node.dataset.device);
    }, 500);
  });
  node.addEventListener('pointerup', () => clearTimeout(longPressTimer));
  node.addEventListener('pointermove', () => clearTimeout(longPressTimer));
});

function showWheel(e, id) {
  e.preventDefault();
  document.getElementById('wheelOverlay').classList.add('visible');
}

function hideWheel() {
  document.getElementById('wheelOverlay').classList.remove('visible');
}
</script>
